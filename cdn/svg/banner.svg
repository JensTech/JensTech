<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 310" role="img">
  <title>Chloe GitHub Banner</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#0d1424"/>
    </linearGradient>

    <radialGradient id="lightTopRight" cx="100%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#7c5cff" opacity="0.14"/>
      <stop offset="60%" stop-color="#3b82f6" opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" opacity="0"/>
    </radialGradient>

    <radialGradient id="lightBottomLeft" cx="0%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#3b82f6" opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" opacity="0"/>
    </radialGradient>

    <clipPath id="round">
      <rect width="680" height="310" rx="18"/>
    </clipPath>
  </defs>

  <!-- base -->
  <rect width="680" height="310" fill="url(#bg)" clip-path="url(#round)"/>

  <!-- lighting -->
  <rect width="680" height="310" fill="url(#lightTopRight)" clip-path="url(#round)"/>
  <rect width="680" height="310" fill="url(#lightBottomLeft)" clip-path="url(#round)"/>

  <!-- main identity -->
  <text x="60" y="150"
        font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif"
        font-size="54"
        font-weight="600"
        fill="#e8ecf3">
    Chloe
  </text>

  <text x="60" y="182"
        font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif"
        font-size="15"
        fill="#94a3b8">
    Full-stack developer
  </text>

  <!-- accent line -->
  <line x1="60" y1="200" x2="340" y2="200" stroke="#7c5cff" opacity="0.25"/>

  <!-- tech stack -->
  <text x="60" y="230"
        font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif"
        font-size="13"
        fill="#6b7a90">
    PHP · TypeScript · React
  </text>

  <!-- GitHub link -->
  <text x="520" y="285"
        font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif"
        font-size="12"
        fill="#94a3b8"
        opacity="0.9">
    github.com/JensTech
  </text>

  <!-- subtle border -->
  <rect x="1" y="1" width="678" height="308" rx="18"
        fill="none" stroke="#ffffff" opacity="0.05"/>
</svg>