<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 310" role="img">
  <title>JensTech GitHub Banner</title>
  <desc>Terminal-style GitHub profile banner for JensTech</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a" />
      <stop offset="100%" style="stop-color:#0a1628" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2540" stroke-width="0.5" />
    </pattern>
    <clipPath id="rounded">
      <rect width="680" height="310" rx="12" ry="12" />
    </clipPath>
  </defs>
  <rect width="680" height="310" rx="12" ry="12" fill="url(#bg)" />
  <rect width="680" height="310" fill="url(#grid)" clip-path="url(#rounded)" opacity="0.6" />
  <ellipse cx="120" cy="155" rx="160" ry="140" fill="#00ff88" opacity="0.03" />
  <ellipse cx="560" cy="110" rx="180" ry="130" fill="#0088ff" opacity="0.04" />
  <rect x="30" y="25" width="300" height="260" rx="8" fill="#0b1220" stroke="#1e3050" stroke-width="1" />
  <rect x="30" y="25" width="300" height="32" rx="8" fill="#111927" />
  <rect x="30" y="41" width="300" height="16" fill="#111927" />
  <circle cx="50" cy="41" r="6" fill="#ff5f57" />
  <circle cx="70" cy="41" r="6" fill="#febc2e" />
  <circle cx="90" cy="41" r="6" fill="#28c840" />
  <text x="180" y="46" font-family="'Courier New', monospace" font-size="11" fill="#4a6080" text-anchor="middle">jens@github: ~</text>
  <text x="48" y="80" font-family="'Courier New', monospace" font-size="12">
    <tspan fill="#00ff88">jens</tspan>
    <tspan fill="#4a6080">@</tspan>
    <tspan fill="#0088ff">github</tspan>
    <tspan fill="#4a6080">:</tspan>
    <tspan fill="#cc88ff">~</tspan>
    <tspan fill="#4a6080"> $ </tspan>
    <tspan fill="#e0e8f0">ls projects/</tspan>
  </text>
  <text x="48" y="96" font-family="'Courier New', monospace" font-size="11">
    <tspan fill="#0088ff">Sparx-AI-Tools</tspan>
    <tspan fill="#4a6080"></tspan>
    <tspan fill="#0088ff">Gitpullinator</tspan>
    <tspan fill="#4a6080"></tspan>
    <tspan fill="#2a4060">[+5 private]</tspan>
  </text>
  <text x="48" y="118" font-family="'Courier New', monospace" font-size="12">
    <tspan fill="#00ff88">jens</tspan>
    <tspan fill="#4a6080">@</tspan>
    <tspan fill="#0088ff">github</tspan>
    <tspan fill="#4a6080">:</tspan>
    <tspan fill="#cc88ff">~</tspan>
    <tspan fill="#4a6080"> $ </tspan>
    <tspan fill="#e0e8f0">uptime</tspan>
  </text>
  <text x="48" y="134" font-family="'Courier New', monospace" font-size="11" fill="#c0cce0">up 5 years</text>
  <text x="48" y="156" font-family="'Courier New', monospace" font-size="12">
    <tspan fill="#00ff88">jens</tspan>
    <tspan fill="#4a6080">@</tspan>
    <tspan fill="#0088ff">github</tspan>
    <tspan fill="#4a6080">:</tspan>
    <tspan fill="#cc88ff">~</tspan>
    <tspan fill="#4a6080"> $ </tspan>
  </text>
  <text x="48" y="268" font-family="'Courier New', monospace" font-size="11" fill="#2a4060">// github.com/JensTech</text>
  <text x="350" y="110" font-family="'Courier New', monospace" font-size="48" font-weight="bold" fill="none" stroke="#1e3050" stroke-width="1" letter-spacing="-1">JensTech</text>
  <text x="350" y="110" font-family="'Courier New', monospace" font-size="48" font-weight="bold">
    <tspan fill="#00ff88">Jens</tspan><tspan fill="#00ff88">Tech</tspan>
  </text>
  <line x1="350" y1="122" x2="650" y2="122" stroke="#00ff88" stroke-width="1" opacity="0.3" />
  <text x="352" y="150" font-family="'Courier New', monospace" font-size="14" fill="#4a6080">jenstech.qzz.io</text>
  <rect x="352" y="194" width="52" height="22" rx="4" fill="#1a2e1a" stroke="#00ff88" stroke-width="1" opacity="0.7" />
  <text x="378" y="209" font-family="'Courier New', monospace" font-size="11" fill="#00ff88" text-anchor="middle">PHP</text>
  <rect x="412" y="194" width="44" height="22" rx="4" fill="#1a1a2e" stroke="#0088ff" stroke-width="1" opacity="0.7" />
  <text x="434" y="209" font-family="'Courier New', monospace" font-size="11" fill="#0088ff" text-anchor="middle">JS</text>
  <rect x="464" y="194" width="52" height="22" rx="4" fill="#1e1a2e" stroke="#cc88ff" stroke-width="1" opacity="0.7" />
  <text x="490" y="209" font-family="'Courier New', monospace" font-size="11" fill="#cc88ff" text-anchor="middle">CSS</text>
  <rect x="524" y="194" width="56" height="22" rx="4" fill="#2e1a1a" stroke="#ff6b6b" stroke-width="1" opacity="0.7" />
  <text x="552" y="209" font-family="'Courier New', monospace" font-size="11" fill="#ff6b6b" text-anchor="middle">HTML</text>
  <rect x="0.5" y="0.5" width="679" height="309" rx="12" ry="12" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.15" />
