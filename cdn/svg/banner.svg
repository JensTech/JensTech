<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0d1424"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.03"/>
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:0.01"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2540" stroke-width="0.5"/>
    </pattern>
    <clipPath id="rounded">
      <rect width="1200" height="300" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- Background -->

  <rect width="1200" height="300" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Grid overlay -->

  <rect width="1200" height="300" fill="url(#grid)" clip-path="url(#rounded)" opacity="0.6"/>

  <!-- Scanline effect -->

  <rect width="1200" height="300" fill="url(#scanline)" clip-path="url(#rounded)"/>

  <!-- Ambient glow blobs -->

  <ellipse cx="200" cy="150" rx="200" ry="120" fill="#00ff88" opacity="0.03"/>
  <ellipse cx="950" cy="100" rx="250" ry="150" fill="#0088ff" opacity="0.04"/>
  <ellipse cx="600" cy="280" rx="300" ry="100" fill="#00ffcc" opacity="0.02"/>

  <!-- Terminal window chrome -->

  <rect x="40" y="30" width="520" height="240" rx="8" fill="#0b1220" stroke="#1e3050" stroke-width="1" clip-path="url(#rounded)"/>

  <!-- Title bar -->

  <rect x="40" y="30" width="520" height="32" rx="8" fill="#111927"/>
  <rect x="40" y="46" width="520" height="16" fill="#111927"/>

  <!-- Window dots -->

  <circle cx="62" cy="46" r="6" fill="#ff5f57"/>
  <circle cx="82" cy="46" r="6" fill="#febc2e"/>
  <circle cx="102" cy="46" r="6" fill="#28c840"/>

  <!-- Terminal title -->

<text x="280" y="51" font-family="'Courier New', monospace" font-size="11" fill="#4a6080" text-anchor="middle">jens@github: ~</text>

  <!-- Terminal content -->

  <!-- Line 1: prompt -->

  <text x="62" y="100" font-family="'Courier New', monospace" font-size="13">
    <tspan fill="#00ff88">jens</tspan>
    <tspan fill="#4a6080">@</tspan>
    <tspan fill="#0088ff">github</tspan>
    <tspan fill="#4a6080">:</tspan>
    <tspan fill="#cc88ff">~</tspan>
    <tspan fill="#4a6080"> $ </tspan>
    <tspan fill="#e0e8f0">whoami</tspan>
  </text>

  <!-- Line 2: output -->

<text x="62" y="122" font-family="'Courier New', monospace" font-size="13" fill="#c0cce0">Jens</text>

  <!-- Line 3: prompt -->

  <text x="62" y="150" font-family="'Courier New', monospace" font-size="13">
    <tspan fill="#00ff88">jens</tspan>
    <tspan fill="#4a6080">@</tspan>
    <tspan fill="#0088ff">github</tspan>
    <tspan fill="#4a6080">:</tspan>
    <tspan fill="#cc88ff">~</tspan>
    <tspan fill="#4a6080"> $ </tspan>
    <tspan fill="#e0e8f0">cat stack.txt</tspan>
  </text>

  <!-- Line 4: output -->

  <text x="62" y="172" font-family="'Courier New', monospace" font-size="12">
    <tspan fill="#febc2e">HTML</tspan>
    <tspan fill="#4a6080">  </tspan>
    <tspan fill="#0088ff">CSS</tspan>
    <tspan fill="#4a6080">  </tspan>
    <tspan fill="#00ff88">JS</tspan>
    <tspan fill="#4a6080">  </tspan>
    <tspan fill="#cc88ff">PHP</tspan>
    <tspan fill="#4a6080">  </tspan>
    <tspan fill="#ff6b6b">AI</tspan>
  </text>

  <!-- Line 5: prompt with cursor -->

  <text x="62" y="200" font-family="'Courier New', monospace" font-size="13">
    <tspan fill="#00ff88">jens</tspan>
    <tspan fill="#4a6080">@</tspan>
    <tspan fill="#0088ff">github</tspan>
    <tspan fill="#4a6080">:</tspan>
    <tspan fill="#cc88ff">~</tspan>
    <tspan fill="#4a6080"> $ </tspan>
  </text>
  <!-- Blinking cursor block -->
  <rect x="220" y="188" width="4" height="14" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>

  <!-- Line 6: URL at bottom of terminal -->

<text x="62" y="248" font-family="'Courier New', monospace" font-size="11" fill="#2a4060">// github.com/JensTech</text>

  <!-- Right side: big username display -->

<text x="680" y="130" font-family="'Courier New', monospace" font-size="62" font-weight="bold" fill="none" stroke="#1e3050" stroke-width="1" letter-spacing="-1">JensTech</text>
<text x="680" y="130" font-family="'Courier New', monospace" font-size="62" font-weight="bold" letter-spacing="-1">
<tspan fill="#00ff88">Jens</tspan><tspan fill="#00ff88">Tech</tspan>
</text>

  <!-- Decorative line under username -->

  <line x1="680" y1="142" x2="1160" y2="142" stroke="#00ff88" stroke-width="1" opacity="0.3" filter="url(#glow)"/>

  <!-- GitHub URL -->

<text x="682" y="172" font-family="'Courier New', monospace" font-size="15" fill="#4a6080">jenstech.qzz.io</text>

  <!-- Tag line -->

<text x="682" y="210" font-family="'Courier New', monospace" font-size="13" fill="#2a5040">// i make better docs then apis</text>

  <!-- Stack badges row -->

  <rect x="682" y="228" width="52" height="22" rx="4" fill="#1a2e1a" stroke="#00ff88" stroke-width="1" opacity="0.7"/>
  <text x="708" y="243" font-family="'Courier New', monospace" font-size="11" fill="#00ff88" text-anchor="middle">PHP</text>

  <rect x="742" y="228" width="44" height="22" rx="4" fill="#1a1a2e" stroke="#0088ff" stroke-width="1" opacity="0.7"/>
  <text x="764" y="243" font-family="'Courier New', monospace" font-size="11" fill="#0088ff" text-anchor="middle">JS</text>

  <rect x="794" y="228" width="52" height="22" rx="4" fill="#1e1a2e" stroke="#cc88ff" stroke-width="1" opacity="0.7"/>
  <text x="820" y="243" font-family="'Courier New', monospace" font-size="11" fill="#cc88ff" text-anchor="middle">CSS</text>

  <rect x="854" y="228" width="56" height="22" rx="4" fill="#2e1a1a" stroke="#ff6b6b" stroke-width="1" opacity="0.7"/>
  <text x="882" y="243" font-family="'Courier New', monospace" font-size="11" fill="#ff6b6b" text-anchor="middle">HTML</text>

  <!-- Border glow -->

  <rect x="0.5" y="0.5" width="1199" height="299" rx="12" ry="12" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.15"/>
  <rect x="1" y="1" width="1198" height="298" rx="11" ry="11" fill="none" stroke="#0088ff" stroke-width="0.5" opacity="0.1"/>
</svg>
